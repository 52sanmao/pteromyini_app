name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ios-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Create unsigned IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r pteromyini_app_unsigned.ipa Payload/
        shell: bash

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pteromyini_app_ipa
          path: pteromyini_app_unsigned.ipa
          retention-days: 7
